<!DOCTYPE html>
<html lang="en">
<head>

<body>

  <main class="page">
    <div class="page-header">
  <span class="badge">Provider Availability</span>

  <h1 id="pageTitle">Loading availability...</h1>

  <p class="subtitle" id="pageSubtitle">
    Loading provider availability data...
  </p>
</div>

    <div class="stats">

      <div class="stat-card">
      <span>Provider</span>
      <strong id="providerName">Loading...</strong>
      </div>

      <div class="stat-card">
      <span>Country</span>

  <footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const SUPABASE_URL = "https://hqqwkjietqcmewzsaugp.supabase.co";
    const SUPABASE_KEY = "sb_publishable_SIDGigPpsbkQgtbo0u2uOg_w3w1slmH";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function getFlag(countrySlug) {
  const flags = {
    "canada": "🇨🇦",
    "brazil": "🇧🇷",
    "australia": "🇦🇺",
    "new-zealand": "🇳🇿",
    "germany": "🇩🇪",
    "switzerland": "🇨🇭",
    "netherlands": "🇳🇱",
    "sweden": "🇸🇪",
    "norway": "🇳🇴",
    "finland": "🇫🇮"
  };

  return flags[countrySlug] || "🌍";
}

    async function loadProviderData() {
        const params = new URLSearchParams(window.location.search);
        const providerSlug = params.get("provider");
        const countrySlug = params.get("country");

        const { data, error } = await supabaseClient
          .from("provider_availability")
          .select("*")
          .eq("provider_slug", providerSlug)
          .eq("country_slug", countrySlug)
          .single();


        if (error) {
      console.error(error);

      document.getElementById("countryResult").innerHTML =
        "<p>Unable to load availability data.</p>";

      return;
    }
      document.getElementById("pageTitle").textContent =
  `${data.provider} Availability in ${getFlag(data.country_slug)} ${data.country}`;

      document.getElementById("pageSubtitle").textContent =
      `Check whether ${data.provider} is available in ${getFlag(data.country_slug)} ${data.country} on ${data.casino}. This page tracks availability status, last verification date and provider information.`;
      
      document.getElementById("providerName").textContent = data.provider;
      document.getElementById("countryName").textContent =
      `${getFlag(data.country_slug)} ${data.country}`;
      document.getElementById("casinoName").textContent = data.casino;

      document.title =
      `${data.provider} Availability in ${data.country} | SlotAvailability`;
      
      const availability =
  data.available === null
    ? "Unknown"
    : data.available
      ? "Available"
      : "Not available";

const statusClass =
  data.available === null
    ? "unknown"
    : data.available
      ? "available"
      : "unavailable";

document.getElementById("countryResult").innerHTML = `
  <div class="detail-card">

    <div class="detail-header">
      <h2>Availability Status</h2>
      <span class="status-badge ${statusClass}">${availability}</span>
    </div>

    <div class="detail-grid">
      <div class="detail-item">
        <span>Provider</span>
        <strong>${data.provider}</strong>
      </div>

      <div class="detail-item">
        <span>Country</span>
        <strong><span class="flag">${getFlag(data.country_slug)}</span>${data.country}</strong>
      </div>

      <div class="detail-item">
        <span>Casino</span>
        <strong>${data.casino}</strong>
      </div>

      <div class="detail-item">
        <span>Last checked</span>
        <strong>${data.last_checked}</strong>
      </div>

      <div class="detail-item">
        <span>Source</span>
        <strong>${data.source || "Manual"}</strong>
      </div>

      <div class="detail-item">
        <span>Status</span>
        <strong>${availability}</strong>
      </div>
    </div>

  </div>
`;
    }

    loadProviderData();
  </script>
  <script src="/assets/nav.js"></script>
</body>
</html>
